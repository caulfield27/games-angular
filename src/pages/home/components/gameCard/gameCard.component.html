<article class="game-tile">

  <!-- Image area (links to game) -->
  <a [routerLink]="href" class="game-tile__media">
    <img [src]="image" [alt]="name" class="game-tile__image" />
  </a>

  <!-- Ribbon title bar -->
  <div class="game-tile__title-bar">
    <h3 class="game-tile__name">{{ name }}</h3>
    <span class="game-tile__badge">2D</span>
  </div>

  <!-- Tinted body with tag chips -->
  <div class="game-tile__body">
    <div class="game-tile__tags">
      @for (tag of tags; track tag) {
        <button (click)="onTagAdd(tag)" type="button" class="game-tile__tag">
          {{ tag }}
        </button>
      }
    </div>
  </div>

</article>
