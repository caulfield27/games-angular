<article class="game-tile">
  <a [routerLink]="href" class="game-tile__media">
    <img [src]="image" [alt]="name" class="game-tile__image" />
    <div class="game-tile__shade"></div>

    <div class="game-tile__topline">
      <span class="game-tile__label">2D game</span>
      <span class="game-tile__label game-tile__label--accent">
        {{ tags[0] }}
      </span>
    </div>

    <div class="game-tile__headline">
      <h3>{{ name }}</h3>
    </div>
  </a>

  <div class="game-tile__body">
    <div class="game-tile__tags">
      @for (tag of tags; track tag) {
        <button (click)="onTagAdd(tag)" type="button" class="game-tile__tag">
          {{ tag }}
        </button>
      }
    </div>
  </div>
</article>
