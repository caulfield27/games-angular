@if (battleshipService.isChatOpen()) {

  <!-- Expanded chat panel -->
  <div class="chat-panel">
    <div class="chat-header">
      <span class="chat-header__name">{{ battleshipService.gameMetadata().opName }}</span>
      <button class="chat-close" (click)="onCLose()" type="button" aria-label="Закрыть чат">✕</button>
    </div>

    <div class="chat-messages">
      <div class="messages-inner">
        @for (message of chatService.messages(); track $index) {
          <div [ngClass]="['msg', message.type === 'opponent' ? 'msg--op' : 'msg--me']">
            {{ message.content }}
          </div>
        }
      </div>
    </div>

    <div class="chat-footer">
      <input
        #msgInput
        (keydown)="onKeyDown($event)"
        type="text"
        placeholder="написать..."
        class="chat-input"
      />
      <button class="chat-send" (click)="handleSend()" type="button" aria-label="Отправить">
        <img src="/send.svg" alt="отправить" />
      </button>
    </div>
  </div>

} @else {

  <!-- Collapsed chat bubble -->
  <button class="chat-bubble" (click)="onOpen()" type="button" aria-label="Открыть чат">
    <img class="chat-bubble__icon" src="/chat.png" alt="chat" />
    @if (battleshipService.notifications() > 0) {
      <span class="chat-badge">{{ battleshipService.notifications() }}</span>
    }
  </button>

}
