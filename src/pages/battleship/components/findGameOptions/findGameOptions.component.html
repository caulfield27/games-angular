<div class="options-wrapper">

  <!-- Mode tab switcher -->
  <div class="tab-bar">
    <button
      class="tab-btn"
      [class.tab-btn--active]="type === 'random'"
      (click)="onChange($event)"
      name="random"
      type="button"
    >СЛУЧАЙНЫЙ</button>
    <button
      class="tab-btn"
      [class.tab-btn--active]="type === 'friend'"
      (click)="onChange($event)"
      name="friend"
      type="button"
    >С ДРУГОМ</button>
  </div>

  <!-- Random opponent -->
  @if (type === 'random') {
    <div class="ribbon-card">
      <div class="ribbon-title">ПОИСК ПРОТИВНИКА</div>
      <div class="ribbon-body ribbon-body--sky">
        <p class="option-hint">Система подберёт случайного соперника.</p>
        <button
          (click)="handleFindOpponent()"
          class="find-btn"
          [class.find-btn--loading]="battleshipService.selectionLoading()"
          type="button"
        >
          @if (battleshipService.selectionLoading()) {
            ПОДБОР...
          } @else {
            НАЙТИ ПРОТИВНИКА
          }
        </button>
      </div>
    </div>
  }

  <!-- Invite friend -->
  @if (type === 'friend') {
    <div class="ribbon-card">
      <div class="ribbon-title">ПРИГЛАСИТЬ ДРУГА</div>
      <div class="ribbon-body ribbon-body--peach">
        <p class="option-hint">Отправьте другу эту ссылку — с вами сыграет первый, кто перейдёт по ней.</p>
        @if (inviteLink) {
          <div class="link-row">
            <span class="link-text">{{ inviteLink }}</span>
            <button (click)="handleCopy()" class="copy-btn" type="button" title="Скопировать">
              <img src="/copy.svg" alt="copy" />
            </button>
          </div>
        }
      </div>
    </div>
  }

</div>
