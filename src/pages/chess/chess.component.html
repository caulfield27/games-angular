<div
  class="h-[100svh] w-full bg-neutral-800 flex justify-center items-center relative"
>
  @if (chessService.gameType() === null) {
    <div class="w-full h-full flex flex-col gap-8 justify-center items-center">
      <div
        class="bg-neutral-900 min-w-[500px] max-sm:min-w-[95%] max-w-[500px] p-10 max-sm:p-5 rounded-3xl"
      >
        <div class="w-full flex flex-col gap-5">
          <chess-button
            label="Играть онлайн"
            [icon]="GlobeIcon"
            iconColor="#fff"
            variant="primary"
            (handleClick)="onGameTypeChoose('online')"
          />
          <chess-button
            label="Играть с ботами"
            [icon]="BotIcon"
            iconColor="#fff"
            variant="primary"
            (handleClick)="onGameTypeChoose('online')"
          />
          <chess-button
            label="Играть c другом"
            [icon]="HandshakeIcon"
            iconColor="#fff"
            variant="primary"
            (handleClick)="onGameTypeChoose('bot')"
          />
          <chess-button
            label="Играть вживую"
            [icon]="UsersIcon"
            iconColor="#fff"
            variant="primary"
            (handleClick)="onGameTypeChoose('irl')"
          />
          <chess-button
            label="Тема"
            [icon]="PaintBrushIcon"
            iconColor="#fff"
            variant="primary"
            (handleClick)="openThemeSettings()"
          />
        </div>
      </div>
    </div>
  } @else {
    <button
      (click)="onGoback()"
      class="border-0 bg-none outline-none absolute left-[20px] top-[20px]"
    >
      <lucide-icon [img]="ArrowIcon" color="#fff" size="30"></lucide-icon>
    </button>
    <game></game>
  }
</div>

@if (isThemeModalOpen) {
  <theme-modal [isOpen]="isThemeModalOpen" (onClose)="closeThemeSettings()" />
}

@if (chessService.isGameEndModalOpen()) {
  <game-end-modal
    [data]="chessService.gameEndData()"
    [isOpen]="chessService.isGameEndModalOpen()"
    (close)="reset()"
  />
}
