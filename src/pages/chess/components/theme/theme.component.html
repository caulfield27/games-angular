<div class="theme-backdrop" (click)="close()">
  <div class="theme-card" (click)="$event.stopPropagation()">

    <!-- Header: ribbon title bar -->
    <div class="theme-header">
      <span class="theme-header__title">ВЫБЕРИТЕ ТЕМУ</span>
      <button class="theme-close" (click)="close()" aria-label="Закрыть">✕</button>
    </div>

    <!-- Body: steel-tinted ribbon body -->
    <div class="theme-body">
      <div class="theme-grid">
        @for (theme of themes; track theme.name) {
          <div
            class="theme-option"
            [class.theme-option--active]="theme === selectedTheme"
            (click)="selectTheme(theme)"
          >
            <div class="theme-board-preview">
              @for (sq of preview; track $index) {
                <div
                  class="theme-board-sq"
                  [style.background]="getColor($index, theme)"
                ></div>
              }
            </div>
            <span class="theme-option__label">{{ theme.name }}</span>
          </div>
        }
      </div>
    </div>

    <!-- Footer: save button -->
    <div class="theme-footer">
      <chess-button
        variant="primary"
        label="СОХРАНИТЬ"
        (handleClick)="handleSave()"
      />
    </div>

  </div>
</div>
