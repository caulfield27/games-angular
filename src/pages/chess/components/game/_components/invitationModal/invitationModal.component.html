<div
  class="absolute inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm"
>
  <div
    class="flex w-[400px] max-w-[calc(100vw-32px)] flex-col gap-5 rounded-xl border border-[#c5c0b1] bg-[#fffefb] p-6 text-center"
  >
    <div>
      <h2 class="text-[20px] font-semibold leading-[25px] text-[#201515]">
        Поделитесь ссылкой
      </h2>
      <p class="mt-1 text-[14px] text-[#605d52]">
        С вами сыграет первый, кто перейдет по этой ссылке
      </p>
    </div>

    <div
      class="flex w-full items-center justify-center rounded-md border border-[#c5c0b1] bg-[#f8f4f0] px-4 py-3"
    >
      <span class="break-all text-[13px] text-[#605d52]">{{ link }}</span>
    </div>

    <div class="flex flex-col gap-3">
      <chess-button
        label="Скопировать"
        [icon]="CopyIcon"
        variant="secondary"
        (handleClick)="onCopy()"
      />
      <chess-button label="Отмена" variant="primary" (handleClick)="onCancel()" />
    </div>
  </div>
</div>
