<div class="invite-backdrop">
  <div class="invite-card">

    <!-- Header: ribbon title bar -->
    <div class="invite-header">ПОДЕЛИТЕСЬ ССЫЛКОЙ</div>

    <!-- Body: lime-tinted ribbon body -->
    <div class="invite-body">
      <p class="invite-desc">
        С вами сыграет первый, кто перейдет по этой ссылке.
      </p>

      <div class="invite-link-box">
        <span class="invite-link-text">{{ link }}</span>
      </div>
    </div>

    <!-- Footer: action buttons -->
    <div class="invite-footer">
      <chess-button
        label="СКОПИРОВАТЬ"
        [icon]="CopyIcon"
        variant="primary"
        (handleClick)="onCopy()"
      />
      <chess-button
        label="ОТМЕНА"
        variant="secondary"
        (handleClick)="onCancel()"
      />
    </div>

  </div>
</div>
