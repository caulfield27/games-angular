<div
  class="absolute inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 animate-fade-in"
>
  <div
    class="bg-white border border-neutral-200/80 shadow-[0_24px_60px_-38px_rgba(15,23,42,0.38)] rounded-2xl p-10 text-center min-w-[400px] max-w-[400px] max-sm:min-w-full flex flex-col gap-4"
  >
    <h2 class="text-[18px]">
      С вами сыграет первый, кто перейдет по этой ссылке
    </h2>
    <div
      class="w-full py-2 px-3 rounded-md bg-neutral-200 flex justify-center items-center"
    >
      <span>{{ link }}</span>
    </div>
    <chess-button
      label="Скопировать"
      [icon]="CopyIcon"
      variant="dark"
      (handleClick)="onCopy()"
    />
    <chess-button label="Отмена" (handleClick)="onCancel()" />
  </div>
</div>
