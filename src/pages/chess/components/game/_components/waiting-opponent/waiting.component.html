<div
  class="absolute inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 animate-fade-in"
>
  <div
    class="bg-neutral-900 text-white rounded-2xl p-10 shadow-2xl text-center w-[360px]"
  >
    <div class="text-5xl mb-4 animate-pulse">♟</div>
    <h2 class="text-xl font-semibold mb-2">Подбор противника</h2>
    <div class="text-gray-400 text-sm mb-6">
      Время ожидания: {{ formattedTime }}
    </div>
    <div class="flex justify-center mb-6">
      <div
        class="h-14 w-14 border-4 border-gray-600 border-t-white rounded-full animate-spin"
      ></div>
    </div>
    <div class="flex justify-center gap-2 mb-8">
      <span class="w-2 h-2 bg-white rounded-full animate-bounce"></span>
      <span
        class="w-2 h-2 bg-white rounded-full animate-bounce [animation-delay:0.2s]"
      ></span>
      <span
        class="w-2 h-2 bg-white rounded-full animate-bounce [animation-delay:0.4s]"
      ></span>
    </div>
    <chess-button label="Отмена" (handleClick)="cancelSearch()" />
  </div>
</div>
