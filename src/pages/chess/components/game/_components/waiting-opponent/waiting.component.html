<div class="waiting-backdrop">
  <div class="waiting-card">

    <!-- Header: ribbon title bar -->
    <div class="waiting-header">ПОИСК СОПЕРНИКА</div>

    <!-- Body: sky-tinted ribbon body -->
    <div class="waiting-body">
      <span class="waiting-chess-icon">♟</span>

      <div class="waiting-text">
        <span class="waiting-subtitle">Время ожидания</span>
        <span class="waiting-timer">{{ formattedTime }}</span>
      </div>

      <div class="waiting-spinner"></div>
    </div>

    <!-- Footer: cancel button -->
    <div class="waiting-footer">
      <chess-button label="ОТМЕНА" variant="secondary" (handleClick)="cancelSearch()" />
    </div>

  </div>
</div>
