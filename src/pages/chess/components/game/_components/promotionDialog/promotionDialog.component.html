<div
  [style]="promotionPosition(chessService.pawnPromotionIndex())"
  class="promotion-popup"
>
  <div
    [style]="{ width: cellSize + 'px', height: cellSize + 'px' }"
    role="button"
    (click)="onPromotionChoose('queen')"
  >
    <img
      [src]="
        chessService.moveTurn() === 'white' ? '/chess/wq.svg' : '/chess/bq.svg'
      "
      alt="chess figure"
    />
  </div>
  <div
    [style]="{ width: cellSize + 'px', height: cellSize + 'px' }"
    role="button"
    (click)="onPromotionChoose('rook')"
  >
    <img
      [src]="
        chessService.moveTurn() === 'white' ? '/chess/wr.svg' : '/chess/br.svg'
      "
      alt="chess figure"
    />
  </div>
  <div
    [style]="{ width: cellSize + 'px', height: cellSize + 'px' }"
    role="button"
    (click)="onPromotionChoose('knight')"
  >
    <img
      [src]="
        chessService.moveTurn() === 'white' ? '/chess/wn.svg' : '/chess/bn.svg'
      "
      alt="chess figure"
    />
  </div>
  <div
    [style]="{ width: cellSize + 'px', height: cellSize + 'px' }"
    role="button"
    (click)="onPromotionChoose('bishop')"
  >
    <img
      [src]="
        chessService.moveTurn() === 'white' ? '/chess/wb.svg' : '/chess/bb.svg'
      "
      alt="chess figure"
    />
  </div>
</div>
