<!-- Backdrop -->
<div class="backdrop" (click)="onClose()" role="dialog" aria-modal="true" aria-label="Авторизация">

  <!-- Modal card -->
  <div class="modal-card" (click)="$event.stopPropagation()">

    <!-- Header: ribbon title bar with tabs -->
    <div class="modal-header">
      <button
        class="tab-btn"
        [class.tab-btn--active]="activeTab === 'login'"
        (click)="setActiveTab('login')"
        type="button"
      >ВХОД</button>
      <button
        class="tab-btn"
        [class.tab-btn--active]="activeTab === 'register'"
        (click)="setActiveTab('register')"
        type="button"
      >РЕГИСТРАЦИЯ</button>
      <button class="modal-close" (click)="onClose()" aria-label="Закрыть">✕</button>
    </div>

    <!-- Login form -->
    @if (activeTab === 'login') {
      <form (submit)="handleLogin($event)" class="modal-body modal-body--sky">
        <div class="field">
          <label class="field-label" for="auth-username">Имя пользователя</label>
          <div class="field-input-wrap">
            <lucide-icon [img]="UserIcon" size="15" class="field-icon" />
            <input
              type="text"
              id="auth-username"
              name="username"
              class="field-input"
              placeholder="Введите никнейм"
              required
            />
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="auth-password">Пароль</label>
          <div class="field-input-wrap">
            <lucide-icon [img]="LockIcon" size="15" class="field-icon" />
            <input
              type="password"
              id="auth-password"
              name="password"
              class="field-input"
              placeholder="Введите пароль"
              required
            />
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="modal-btn modal-btn--secondary" (click)="onClose()">
            Отмена
          </button>
          <button type="submit" class="modal-btn modal-btn--primary" [disabled]="isLogging">
            {{ isLogging ? 'Выполняется...' : 'Войти' }}
          </button>
        </div>
      </form>
    }

    <!-- Register form -->
    @if (activeTab === 'register') {
      <form (submit)="handleRegister($event)" class="modal-body modal-body--sage">
        <div class="field">
          <label class="field-label" for="reg-username">Никнейм</label>
          <div class="field-input-wrap">
            <lucide-icon [img]="UserIcon" size="15" class="field-icon" />
            <input
              type="text"
              id="reg-username"
              name="username"
              class="field-input"
              placeholder="Введите никнейм"
              required
            />
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="reg-email">Почта</label>
          <div class="field-input-wrap">
            <lucide-icon [img]="MailIcon" size="15" class="field-icon" />
            <input
              type="email"
              id="reg-email"
              name="email"
              class="field-input"
              placeholder="Введите почту"
              required
            />
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="reg-password">Пароль</label>
          <div class="field-input-wrap">
            <lucide-icon [img]="LockIcon" size="15" class="field-icon" />
            <input
              type="password"
              id="reg-password"
              name="password"
              class="field-input"
              placeholder="Создайте пароль"
              required
              minlength="6"
            />
          </div>
        </div>

        <div class="field field--checkbox">
          <label class="checkbox-label">
            <input type="checkbox" class="checkbox-input" required />
            <span>Я согласен с условиями предоставления услуг и политикой конфиденциальности.</span>
          </label>
        </div>

        <div class="modal-footer">
          <button type="button" class="modal-btn modal-btn--secondary" (click)="onClose()">
            Отмена
          </button>
          <button type="submit" class="modal-btn modal-btn--primary" [disabled]="isRegistring">
            {{ isRegistring ? 'Выполняется...' : 'Создать аккаунт' }}
          </button>
        </div>
      </form>
    }

  </div>
</div>
